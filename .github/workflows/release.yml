name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Typecheck
        working-directory: desktop
        run: npm run typecheck

      - name: Test
        working-directory: desktop
        run: npm run test

      - name: Read release notes
        id: release_notes
        shell: pwsh
        run: |
          $body = node .github/scripts/extract-release-notes.mjs
          "body<<TINyNoteReleaseNotes" >> $env:GITHUB_OUTPUT
          $body >> $env:GITHUB_OUTPUT
          "TINyNoteReleaseNotes" >> $env:GITHUB_OUTPUT

      - uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tauriScript: npm run tauri
          tagName: v__VERSION__
          releaseName: TinyNote v__VERSION__
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          uploadUpdaterSignatures: true
